    </div>

        <h1 class="">Project Dashboard</h1>
        <input type="text" placeholder="Search by project name" id="searchProject" />
        <select id="filter">
            <option value="Select to filter" disabled selected>Select to filter</option>
            <option value="ALL">ALL</option>
            <option value="Completed">Completed</option>
            <option value="In Progress">In Progress</option>
            </option>
        </select>

    <div class="spinner"></div>

                    <th>Department</th>
                    <th>Startdate</th>
